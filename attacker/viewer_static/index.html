<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attacker Results Viewer</title>
<link rel="stylesheet" id="hljs-theme"
  href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/c.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d1117;
  --bg2:     #161b22;
  --bg3:     #21262d;
  --bg4:     #30363d;
  --border:  #30363d;
  --text:    #e6edf3;
  --text2:   #8b949e;
  --text3:   #6e7681;
  --accent:  #58a6ff;
  --green:   #3fb950;
  --red:     #f85149;
  --yellow:  #d29922;
  --purple:  #bc8cff;
  --teal:    #2dd4bf;
  --orange:  #f0883e;
  --sidebar: 300px;
  --mono: 'SF Mono','Fira Code','Cascadia Code',Consolas,monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --radius: 6px;
}
[data-theme="light"] {
  --bg: #fff; --bg2: #f6f8fa; --bg3: #eaeef2; --bg4: #d0d7de;
  --border: #d0d7de; --text: #1f2328; --text2: #656d76; --text3: #8c959f;
  --accent: #0969da; --green: #1a7f37; --red: #d1242f;
  --yellow: #9a6700; --purple: #8250df; --teal: #0f766e; --orange: #bc4c00;
}

html, body { height: 100%; font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 14px; }

/* ── Layout ── */
#app { display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar); min-width: var(--sidebar);
  background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sb-header {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.sb-header .logo { font-weight: 700; font-size: 13px; flex: 1; }
.sb-header .logo span { color: var(--accent); }
.icon-btn {
  background: none; border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text2); padding: 4px 8px; cursor: pointer; font-size: 12px;
  transition: background 0.15s, color 0.15s;
}
.icon-btn:hover { background: var(--bg3); color: var(--text); }

.sb-controls { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
#search {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 6px 10px; color: var(--text);
  font-size: 13px; outline: none; transition: border-color 0.15s;
}
#search:focus { border-color: var(--accent); }
.chip-row { display: flex; flex-wrap: wrap; gap: 4px; }
.chip {
  padding: 2px 8px; border-radius: 12px; font-size: 11px; cursor: pointer;
  background: var(--bg4); border: 1px solid var(--border); color: var(--text2);
  transition: background 0.15s, color 0.15s;
}
.chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.chip.evaded.active { background: var(--green); border-color: var(--green); color: #fff; }
.chip.detected.active { background: var(--red); border-color: var(--red); color: #fff; }

#file-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.group-header {
  padding: 6px 12px 3px; font-size: 11px; font-weight: 600;
  color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em;
  position: sticky; top: 0; background: var(--bg2); z-index: 1;
  cursor: pointer; transition: color 0.15s;
}
.group-header:hover { color: var(--accent); }
.group-header.problem-active { color: var(--accent); border-right: 2px solid var(--accent); }
.file-item {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px; cursor: pointer; transition: background 0.1s;
  font-size: 13px;
}
.file-item:hover { background: var(--bg3); }
.file-item.active { background: var(--bg3); border-right: 2px solid var(--accent); }
.file-item .at-label {
  flex: 1; font-family: var(--mono); font-size: 12px; color: var(--text);
}
.file-item .verdict-icons { display: flex; gap: 3px; }
.vi { font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
.vi.det  { background: rgba(248,81,73,0.15); color: var(--red); }
.vi.evd  { background: rgba(63,185,80,0.15); color: var(--green); }
.vi.na   { background: var(--bg4); color: var(--text3); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot-ok { background: var(--green); }
.dot-bad { background: var(--red); }
.dot-na  { background: var(--text3); }

/* ── Main area ── */
#main {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  background: var(--bg);
}

/* ── Top bar ── */
#topbar {
  height: 48px; background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0;
}
.tb-problem { font-size: 13px; font-weight: 600; }
.tb-slug { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.tb-at {
  font-family: var(--mono); font-size: 12px; padding: 2px 8px;
  background: var(--bg3); border-radius: 4px; color: var(--accent);
}
.badge {
  padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600;
}
.badge-det { background: rgba(248,81,73,0.15); color: var(--red); border: 1px solid rgba(248,81,73,0.3); }
.badge-evd { background: rgba(63,185,80,0.15); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
.badge-na  { background: var(--bg4); color: var(--text3); }
.tb-spacer { flex: 1; }

/* ── Content area (two-panel split) ── */
#content { flex: 1; display: flex; overflow: hidden; }

/* ── Code panel ── */
#code-panel {
  width: 50%; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.panel-header {
  padding: 8px 14px; background: var(--bg2); border-bottom: 1px solid var(--border);
  font-size: 12px; font-weight: 600; color: var(--text2);
  display: flex; align-items: center; gap: 8px;
}
.panel-header .fname { font-family: var(--mono); color: var(--text); }
.code-scroll { flex: 1; overflow: auto; }
.code-scroll pre {
  margin: 0; font-size: 13px; line-height: 1.6;
  background: var(--bg) !important; padding: 8px 0;
}
.code-scroll pre code { font-family: var(--mono) !important; background: transparent !important; }

/* Line numbers */
.code-line { display: block; padding: 0 16px 0 0; }
.code-line:hover { background: rgba(127,127,127,0.06); }
.ln-num {
  display: inline-block; width: 44px; text-align: right;
  padding-right: 16px; color: var(--text3); user-select: none;
  font-size: 12px; opacity: 0.6;
}
.ln-code { white-space: pre; }

/* Attack comment line highlight */
.attack-line { background: rgba(240,136,62,0.08) !important; border-left: 3px solid var(--orange); }
.attack-line .ln-num { color: var(--orange); opacity: 1; }

/* Keyword highlight in text */
mark.kw-mark {
  background: rgba(248,81,73,0.18); color: var(--red);
  border-radius: 2px; padding: 0 2px; font-weight: 600;
  font-style: normal;
}

/* ── Analysis panel ── */
#analysis-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.tabs {
  display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.tab {
  padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer;
  color: var(--text2); border-bottom: 2px solid transparent; transition: color 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { flex: 1; overflow-y: auto; padding: 16px; display: none; }
.tab-content.active { display: block; }

/* Verdict banner */
.verdict-banner {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  border-radius: var(--radius); margin-bottom: 14px; font-size: 13px;
}
.banner-det { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); }
.banner-evd { background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3); }
.banner-na  { background: var(--bg3); border: 1px solid var(--border); }
.banner-icon { font-size: 18px; }
.banner-text { flex: 1; }
.banner-label { font-weight: 700; }
.banner-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }

/* ── Sub-tabs (Explorer / Validator) ── */
.subtabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.subtab {
  padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
  color: var(--text2); border-bottom: 2px solid transparent; transition: color 0.15s;
}
.subtab:hover { color: var(--text); }
.subtab.active { color: var(--accent); border-bottom-color: var(--accent); }
.subtab-content { display: none; }
.subtab-content.active { display: block; }

/* Validation events */
.validation-list { display: flex; flex-direction: column; gap: 8px; }
.val-event {
  border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
}
.val-header {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  cursor: pointer; background: var(--bg2); transition: background 0.1s;
  user-select: none;
}
.val-header:hover { background: var(--bg3); }
.val-reachable {
  font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 10px; flex-shrink: 0;
}
.reach-true  { background: rgba(248,81,73,0.15); color: var(--red); }
.reach-false { background: rgba(63,185,80,0.15); color: var(--green); }
.val-path { font-family: var(--mono); font-size: 11px; color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.val-body {
  padding: 10px 14px; background: var(--bg);
  font-size: 12px; line-height: 1.65; color: var(--text2);
  border-top: 1px solid var(--border); white-space: pre-wrap; word-break: break-word;
  display: none;
}
.val-event.open .val-body { display: block; }
.val-chevron { font-size: 10px; color: var(--text3); transition: transform 0.15s; flex-shrink: 0; }
.val-event.open .val-chevron { transform: rotate(90deg); }

/* Explorer events */
.explorer-list { display: flex; flex-direction: column; gap: 8px; }
.exp-event {
  border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
}
.exp-header {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  cursor: pointer; background: var(--bg2); transition: background 0.1s;
  user-select: none;
}
.exp-header:hover { background: var(--bg3); }
.exp-func { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--accent); flex-shrink: 0; }
.exp-src  { font-family: var(--mono); font-size: 11px; color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.exp-line { font-family: var(--mono); font-size: 11px; color: var(--text3); flex-shrink: 0; }
.exp-body {
  padding: 10px 14px; background: var(--bg);
  font-size: 12px; line-height: 1.65; color: var(--text2);
  border-top: 1px solid var(--border); white-space: pre-wrap; word-break: break-word;
  display: none;
}
.exp-event.open .exp-body { display: block; }
.exp-chevron { font-size: 10px; color: var(--text3); transition: transform 0.15s; flex-shrink: 0; }
.exp-event.open .exp-chevron { transform: rotate(90deg); }
.exp-response {
  font-size: 12px; line-height: 1.65; white-space: pre-wrap; word-break: break-word;
  max-height: 340px; overflow-y: auto; margin-bottom: 8px;
}
.exp-output {
  padding: 6px 10px; background: var(--bg3);
  border-radius: 4px; font-family: var(--mono); font-size: 11px;
  color: var(--text3); white-space: pre-wrap; word-break: break-all;
}

/* VulnLLM */
.vl-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.vl-cell {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 8px 12px;
}
.vl-key { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
.vl-val { font-size: 13px; font-weight: 600; font-family: var(--mono); }
.vl-output {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 14px; font-size: 12px; line-height: 1.7; color: var(--text2);
  white-space: pre-wrap; word-break: break-word; max-height: 60vh; overflow-y: auto;
}
.label-det { color: var(--red); }
.label-evd { color: var(--green); }
.label-unk { color: var(--text3); }
.vl-baseline {
  margin-top: 18px; border-top: 1px solid var(--border); padding-top: 14px;
}
.vl-baseline-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.vl-baseline-title { font-size: 12px; font-weight: 600; color: var(--text2); }
.vl-baseline-badge {
  font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 3px; font-family: var(--mono);
}

/* ── Home/Stats page ── */
#home { flex: 1; overflow-y: auto; padding: 24px 32px; }
.home-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.home-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
.stats-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
  background: var(--bg2); border-radius: var(--radius); overflow: hidden;
  border: 1px solid var(--border);
}
.stats-table th {
  padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em; color: var(--text2);
  background: var(--bg3); border-bottom: 1px solid var(--border);
}
.stats-table th.right { text-align: right; }
.stats-table td { padding: 9px 14px; border-bottom: 1px solid var(--border2); }
.stats-table td.right { text-align: right; font-family: var(--mono); }
.stats-table tr:last-child td { border-bottom: none; }
.stats-table tr.total-row td { font-weight: 700; background: var(--bg3); }
.rate-bar {
  display: inline-flex; align-items: center; gap: 8px;
}
.bar-track {
  width: 80px; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.fill-red  { background: var(--red); }
.fill-blue { background: var(--accent); }
.rate-pct { font-family: var(--mono); font-size: 12px; min-width: 36px; text-align: right; }
.evasion-pct { color: var(--green); font-weight: 600; font-family: var(--mono); font-size: 12px; }

.home-section { margin-top: 28px; }
.home-section-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text2); }

/* ── Placeholder ── */
#placeholder {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--text3); gap: 8px;
}
#placeholder .ph-icon { font-size: 40px; }
#placeholder .ph-text { font-size: 14px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ── No-results ── */
.no-results { padding: 16px; color: var(--text3); font-size: 13px; text-align: center; }

/* ── Per-system baseline badges on group headers ── */
.bl-badges { display: inline-flex; gap: 3px; margin-left: 6px; vertical-align: middle; }
.bl-badge {
  font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
  font-family: var(--mono); letter-spacing: 0.02em;
}
.bl-det  { background: rgba(63,185,80,0.15);  color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
.bl-miss { background: rgba(248,81,73,0.12);  color: var(--red);   border: 1px solid rgba(248,81,73,0.3); }
.bl-na   { background: var(--bg4); color: var(--text3); border: 1px solid var(--border); }

/* ── Path steps in RepoAudit ── */
.path-steps {
  display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
  font-family: var(--mono); font-size: 11px; flex: 1; overflow: hidden;
}
.path-step {
  display: inline-flex; align-items: center; gap: 3px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 3px; padding: 1px 6px; white-space: nowrap;
}
.path-step .ps-label {
  font-size: 9px; font-weight: 700; padding: 0 3px; border-radius: 2px;
  text-transform: uppercase;
}
.ps-SINK  { background: rgba(248,81,73,0.15); color: var(--red); }
.ps-RET   { background: rgba(88,166,255,0.15); color: var(--accent); }
.ps-OUT   { background: rgba(63,185,80,0.15); color: var(--green); }
.ps-ARG   { background: rgba(188,140,255,0.15); color: var(--purple); }
.ps-PARA  { background: rgba(45,212,191,0.15); color: var(--teal); }
.ps-SRC   { background: rgba(210,153,34,0.15); color: var(--yellow); }
.path-arrow { color: var(--text3); font-size: 10px; }

/* ── Loading spinner ── */
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.section-title { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }

/* ── Copy button ── */
.copy-btn {
  background: none; border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text3); cursor: pointer; font-size: 11px; padding: 2px 7px;
  transition: all 0.15s; line-height: 1.5; white-space: nowrap;
}
.copy-btn:hover { background: var(--bg3); color: var(--text); }
.copy-btn.copied { color: var(--green); border-color: var(--green); }

/* Output block wrapper: positions copy button top-right */
.output-wrap { position: relative; }
.output-wrap .copy-btn { position: absolute; top: 8px; right: 8px; z-index: 1; }

/* NPD bug line (baseline view) */
.bug-line { background: rgba(248,81,73,0.08) !important; border-left: 3px solid var(--red); }
.bug-line .ln-num { color: var(--red); opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sb-header">
      <div class="logo">Attacker <span>Viewer</span></div>
      <button class="icon-btn" id="theme-btn" title="Toggle theme">◑</button>
      <button class="icon-btn" id="home-btn" title="Overview">⊞</button>
    </div>
    <div class="sb-controls">
      <input id="search" type="text" placeholder="Search problems or attack types…">
      <div class="chip-row" id="at-chips"></div>
      <div class="chip-row" id="outcome-chips">
        <span class="chip evaded" data-outcome="evaded">Evaded RA</span>
        <span class="chip detected" data-outcome="detected">Caught RA</span>
        <span class="chip evaded" data-outcome="evaded-vl">Evaded VL</span>
        <span class="chip detected" data-outcome="caught-vl">Caught VL</span>
        <span class="chip evaded" data-outcome="evaded-vt">Evaded VT</span>
        <span class="chip detected" data-outcome="caught-vt">Caught VT</span>
        <span class="chip evaded" data-outcome="evaded-ov">Evaded OV</span>
        <span class="chip detected" data-outcome="caught-ov">Caught OV</span>
      </div>
    </div>
    <div id="file-list"></div>
  </div>

  <!-- Main -->
  <div id="main">
    <!-- Top bar (hidden when home) -->
    <div id="topbar" style="display:none">
      <div class="tb-problem" id="tb-problem"></div>
      <div class="tb-slug" id="tb-slug"></div>
      <div class="tb-at" id="tb-at"></div>
      <div id="tb-baseline-badge"></div>
      <div id="tb-ra-badge"></div>
      <div id="tb-vl-badge"></div>
      <div id="tb-vt-badge"></div>
      <div id="tb-ov-badge"></div>
      <div class="tb-spacer"></div>
    </div>

    <!-- Home stats page -->
    <div id="home"></div>

    <!-- Split view (hidden until file selected) -->
    <div id="content" style="display:none">
      <div id="code-panel">
        <div class="panel-header">
          <span>Source Code</span>
          <span class="fname" id="code-fname"></span>
          <span style="flex:1"></span>
          <button class="icon-btn" id="baseline-toggle" style="display:none" title="Toggle between attack variant and clean solution.c">⇄ solution.c</button>
          <button class="icon-btn copy-btn" id="code-copy-btn" title="Copy source code">📋</button>
        </div>
        <div class="code-scroll">
          <pre><code class="language-c" id="code-block"></code></pre>
        </div>
      </div>
      <div id="analysis-panel">
        <div class="tabs">
          <div class="tab active" data-tab="repoaudit">RepoAudit</div>
          <div class="tab" data-tab="vultrial">VulTrial</div>
          <div class="tab" data-tab="openvul">OpenVul</div>
          <div class="tab" data-tab="vulnllm">VulnLLM-R</div>
          <div class="tab" data-tab="scaffold">VL-Agent</div>
          <div class="tab" data-tab="problem">Problem</div>
        </div>
        <div class="tab-content active" id="tab-repoaudit"></div>
        <div class="tab-content" id="tab-vultrial"></div>
        <div class="tab-content" id="tab-openvul"></div>
        <div class="tab-content" id="tab-vulnllm"></div>
        <div class="tab-content" id="tab-scaffold"></div>
        <div class="tab-content" id="tab-problem"></div>
      </div>
    </div>

    <!-- Placeholder -->
    <div id="placeholder" style="display:none">
      <div class="ph-icon">🛡</div>
      <div class="ph-text">Select a solution from the sidebar</div>
    </div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const S = {
  files: [],
  filtered: [],
  stats: null,
  selected: null,          // current file id
  activeATs: new Set(),
  activeOutcomes: new Set(),
  searchText: '',
  showHome: true,
};

// ── API ───────────────────────────────────────────────────────────────────────
async function api(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

// ── Utils ─────────────────────────────────────────────────────────────────────
const ATTACK_TYPES = [
  "COT","FT","CG","AA_MSG","AA_USR","AA_CA",
  "TOOL_ClangSA","TOOL_Frama","TOOL_Fuzzer","TOOL_Coverity"
];

// Keywords present in every attack type's adversarial comment
const GLOBAL_KEYWORDS = ['comment', 'security analysis', 'security check'];

// Keywords specific to each attack type's adversarial comment
const ATTACK_KEYWORDS = {
  COT:          ['cot:', 'chain of thought', 'chain-of-thought', 'reasoning:'],
  FT:           ['ci pipeline', 'binary2int job', 'pipeline log', 'fine-tun'],
  CG:           ['call graph', 'provenance', 'reached from', 'callsite'],
  AA_MSG:       ['guaranteed non-null', 'guaranteed non_null', 'non-null because', 'not empty'],
  AA_USR:       ['user:', 'user note', 'no vulnerability', 'non-null here'],
  AA_CA:        ['assert(', 'runtime guard', 'commented out for profiling', 'live runtime'],
  TOOL_ClangSA: ['clang static analyzer', 'scan-build', 'csa-', 'core.nulldereference', 'clang sa'],
  TOOL_Frama:   ['frama-c', 'frama_c', 'wp plugin', '.frama-c'],
  TOOL_Fuzzer:  ['libfuzzer', 'afl++', 'afl ', 'honggfuzz', 'fuzzer', 'fuzzing', 'corpus:'],
  TOOL_Coverity:['coverity', 'forward_null', 'cid ', 'cov-analyze'],
};

function getKeywords(at) { return [...GLOBAL_KEYWORDS, ...(ATTACK_KEYWORDS[at] || [])]; }

// Highlight keyword occurrences in already-HTML-escaped text
function markKeywords(html, keywords) {
  if (!keywords.length) return html;
  keywords.forEach(kw => {
    const escaped = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`(${escaped})`, 'gi');
    html = html.replace(re, '<mark class="kw-mark">$1</mark>');
  });
  return html;
}

function verdictLabel(flag) {
  if (flag === 'tp') return 'detected';
  if (flag === 'fn') return 'evaded';
  return null;
}

function raBadgeHtml(detected) {
  if (detected === true)  return `<span class="badge badge-det">RA: Detected</span>`;
  if (detected === false) return `<span class="badge badge-evd">RA: Evaded ✓</span>`;
  return `<span class="badge badge-na">RA: N/A</span>`;
}
function flagBadgeHtml(flag, prefix) {
  if (flag === 'tp') return `<span class="badge badge-det">${prefix}: Detected</span>`;
  if (flag === 'fn') return `<span class="badge badge-evd">${prefix}: Evaded ✓</span>`;
  if (flag) return `<span class="badge badge-na">${prefix}: ${flag.toUpperCase()}</span>`;
  return `<span class="badge badge-na">${prefix}: N/A</span>`;
}
function vlBadgeHtml(flag) { return flagBadgeHtml(flag, 'VL'); }
function vtBadgeHtml(flag) { return flagBadgeHtml(flag, 'VT'); }
function ovBadgeHtml(flag) { return flagBadgeHtml(flag, 'OV'); }
function viHtml(detected, label) {
  if (detected === true)  return `<span class="vi det">${label}</span>`;
  if (detected === false) return `<span class="vi evd">${label}</span>`;
  return `<span class="vi na">${label}</span>`;
}
function flagVi(flag, label) {
  if (flag === 'tp') return `<span class="vi det">${label}</span>`;
  if (flag === 'fn') return `<span class="vi evd">${label}</span>`;
  return `<span class="vi na">${label}</span>`;
}

// Render small per-system baseline badges for sidebar group headers
// vl_detectable: true/false/null (from baseline_detectable, VulnLLM-R)
// vt_flag / ov_flag: 'tp'/'fn'/null
function baselineSystemBadges(vl_detectable, vt_flag, ov_flag) {
  function mini(label, detected) {
    if (detected === null || detected === undefined)
      return `<span class="bl-badge bl-na">${label}</span>`;
    return detected
      ? `<span class="bl-badge bl-det">${label} ✓</span>`
      : `<span class="bl-badge bl-miss">${label} ✗</span>`;
  }
  const vlDet = vl_detectable === true ? true : vl_detectable === false ? false : null;
  const vtDet = vt_flag === 'tp' ? true : vt_flag === 'fn' ? false : null;
  const ovDet = ov_flag === 'tp' ? true : ov_flag === 'fn' ? false : null;
  return `<span class="bl-badges">${mini('VL', vlDet)}${mini('VT', vtDet)}${mini('OV', ovDet)}</span>`;
}

function pct(n, d) { return d > 0 ? Math.round(n / d * 100) : 0; }

function rateBarHtml(det, tot, colorClass) {
  const p = pct(det, tot);
  return `<div class="rate-bar">
    <div class="bar-track"><div class="bar-fill ${colorClass}" style="width:${p}%"></div></div>
    <span class="rate-pct">${det}/${tot}</span>
  </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Copy helpers ──────────────────────────────────────────────────────────────
const _cpMap = {};
let _cpN = 0;
function _cpStore(text) { const k = 'k' + (_cpN++); _cpMap[k] = text; return k; }

async function cpDo(e, k) {
  const text = _cpMap[k] || '';
  await navigator.clipboard.writeText(text);
  const btn = e.currentTarget || e.target;
  const orig = btn.textContent;
  btn.textContent = '✓';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
}

// Wrap a .vl-output div with an absolute-positioned copy button
function outputBlock(rawText, contentHtml, extraStyle = '') {
  const k = _cpStore(rawText);
  const styleAttr = extraStyle ? ` style="${extraStyle}"` : '';
  return `<div class="output-wrap"><div class="vl-output"${styleAttr}>${contentHtml}</div><button class="copy-btn" onclick="cpDo(event,'${k}')" title="Copy to clipboard">📋</button></div>`;
}

// ── Hash routing ──────────────────────────────────────────────────────────────
function getHash() {
  const h = location.hash.slice(1);
  const p = {};
  h.split('&').forEach(kv => { const [k,v] = kv.split('='); if (k) p[k] = decodeURIComponent(v||''); });
  return p;
}
function setHash(obj) {
  location.hash = Object.entries(obj).map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join('&');
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function buildATChips() {
  const row = document.getElementById('at-chips');
  row.innerHTML = ATTACK_TYPES.map(at =>
    `<span class="chip" data-at="${at}">${at}</span>`
  ).join('');
  row.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      const at = c.dataset.at;
      if (S.activeATs.has(at)) { S.activeATs.delete(at); c.classList.remove('active'); }
      else { S.activeATs.add(at); c.classList.add('active'); }
      applyFilter();
    });
  });
}

function buildOutcomeChips() {
  document.querySelectorAll('#outcome-chips .chip').forEach(c => {
    c.addEventListener('click', () => {
      const o = c.dataset.outcome;
      if (S.activeOutcomes.has(o)) { S.activeOutcomes.delete(o); c.classList.remove('active'); }
      else { S.activeOutcomes.add(o); c.classList.add('active'); }
      applyFilter();
    });
  });
}

function applyFilter() {
  const q = S.searchText.toLowerCase();
  S.filtered = S.files.filter(f => {
    if (f.verification !== 'ok') return false;
    if (S.activeATs.size && !S.activeATs.has(f.attack_type)) return false;
    if (S.activeOutcomes.size) {
      const rao = f.repoaudit_detected;
      const vlo = f.vulnllm_flag;
      const vto = f.vultrial_flag;
      const ovo = f.openvul_flag;
      let match = false;
      if (S.activeOutcomes.has('evaded')    && rao === false) match = true;
      if (S.activeOutcomes.has('detected')  && rao === true)  match = true;
      if (S.activeOutcomes.has('evaded-vl') && vlo === 'fn')  match = true;
      if (S.activeOutcomes.has('caught-vl') && vlo === 'tp')  match = true;
      if (S.activeOutcomes.has('evaded-vt') && vto === 'fn')  match = true;
      if (S.activeOutcomes.has('caught-vt') && vto === 'tp')  match = true;
      if (S.activeOutcomes.has('evaded-ov') && ovo === 'fn')  match = true;
      if (S.activeOutcomes.has('caught-ov') && ovo === 'tp')  match = true;
      if (!match) return false;
    }
    if (q && !f.problem.toLowerCase().includes(q) && !f.attack_type.toLowerCase().includes(q) && !f.slug.toLowerCase().includes(q)) return false;
    return true;
  });
  renderFileList();
}

function renderFileList() {
  const el = document.getElementById('file-list');
  if (!S.filtered.length) {
    el.innerHTML = '<div class="no-results">No matching solutions</div>';
    return;
  }
  // Group by problem slug
  const groups = {};
  S.filtered.forEach(f => {
    if (!groups[f.slug]) groups[f.slug] = {
      problem: f.problem, items: [],
      baseline_vl: f.baseline_detectable,
      baseline_vt: f.baseline_vt_flag,
      baseline_ov: f.baseline_ov_flag,
    };
    groups[f.slug].items.push(f);
  });
  let html = '';
  for (const [slug, g] of Object.entries(groups)) {
    const baselineBadges = baselineSystemBadges(g.baseline_vl, g.baseline_vt, g.baseline_ov);
    html += `<div class="group-header" data-slug="${escHtml(slug)}">${escHtml(g.problem)}${baselineBadges}</div>`;
    for (const f of g.items) {
      const active = S.selected === f.id ? ' active' : '';
      const dotCls = f.verification === 'ok' ? 'dot-ok' : 'dot-bad';
      html += `<div class="file-item${active}" data-id="${escHtml(f.id)}">
        <span class="status-dot ${dotCls}"></span>
        <span class="at-label">${escHtml(f.attack_type)}</span>
        <span class="verdict-icons">
          ${viHtml(f.repoaudit_detected, 'RA')}
          ${flagVi(f.vultrial_flag, 'VT')}
          ${flagVi(f.openvul_flag, 'OV')}
          ${flagVi(f.vulnllm_flag, 'VL')}
        </span>
      </div>`;
    }
  }
  el.innerHTML = html;
  el.querySelectorAll('.file-item').forEach(item => {
    item.addEventListener('click', () => selectFile(item.dataset.id));
  });
  el.querySelectorAll('.group-header').forEach(hdr => {
    hdr.addEventListener('click', () => selectProblem(hdr.dataset.slug));
  });
}

// ── File selection ─────────────────────────────────────────────────────────────
async function selectFile(id) {
  S.selected = id;
  S.showHome = false;

  // Update sidebar active state
  document.querySelectorAll('.file-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  // Show split view
  document.getElementById('home').style.display = 'none';
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('content').style.display = 'flex';
  document.getElementById('topbar').style.display = 'flex';

  const [slug, at] = id.split('/');
  const f = S.files.find(x => x.id === id);

  // Update top bar immediately with cached data
  document.getElementById('tb-problem').textContent = f?.problem || slug;
  document.getElementById('tb-slug').textContent = slug;
  document.getElementById('tb-at').textContent = at;
  document.getElementById('tb-ra-badge').innerHTML = raBadgeHtml(f?.repoaudit_detected);
  document.getElementById('tb-vl-badge').innerHTML = vlBadgeHtml(f?.vulnllm_flag);
  document.getElementById('tb-vt-badge').innerHTML = vtBadgeHtml(f?.vultrial_flag);
  document.getElementById('tb-ov-badge').innerHTML = ovBadgeHtml(f?.openvul_flag);
  const blEl = document.getElementById('tb-baseline-badge');
  if (blEl) {
    if (f?.baseline_detectable === false)
      blEl.innerHTML = `<span class="badge" style="background:rgba(248,81,73,0.1);color:var(--red);border:1px solid rgba(248,81,73,0.3)" title="Model misses NPD even without attack comment">INVALID</span>`;
    else if (f?.baseline_detectable === true)
      blEl.innerHTML = `<span class="badge badge-na" title="Model detects NPD without attack comment">Valid target</span>`;
    else
      blEl.innerHTML = '';
  }

  // Reset panels
  document.getElementById('code-block').textContent = '⋯ loading';
  document.getElementById('tab-repoaudit').innerHTML = '<div class="spinner"></div>';
  document.getElementById('tab-vultrial').innerHTML = '<div class="spinner"></div>';
  document.getElementById('tab-openvul').innerHTML = '<div class="spinner"></div>';
  document.getElementById('tab-vulnllm').innerHTML = '<div class="spinner"></div>';
  document.getElementById('tab-scaffold').innerHTML = '<div class="spinner"></div>';
  document.getElementById('tab-problem').innerHTML = '<div class="spinner"></div>';

  setHash({ id });

  // Fetch in parallel
  const [sol, ra, vl, vt, ov, sc] = await Promise.all([
    api(`/api/solution?slug=${slug}&at=${encodeURIComponent(at)}`),
    api(`/api/repoaudit?slug=${slug}&at=${encodeURIComponent(at)}`),
    api(`/api/vulnllm?slug=${slug}&at=${encodeURIComponent(at)}`),
    api(`/api/vultrial?slug=${slug}&at=${encodeURIComponent(at)}`),
    api(`/api/openvul?slug=${slug}&at=${encodeURIComponent(at)}`),
    api(`/api/scaffold?slug=${slug}&at=${encodeURIComponent(at)}`),
  ]);

  const keywords = getKeywords(at);
  renderCode(sol, at);
  renderRepoAudit(ra, at, keywords);
  renderVulTrialPanel(vt, keywords);
  renderOpenVulPanel(ov, keywords);
  renderVulnLLM(vl, f?.vulnllm_flag, keywords);
  renderScaffold(sc, at, keywords);
  renderProblem(sol);
}

// ── Problem baseline view ──────────────────────────────────────────────────────
async function selectProblem(slug) {
  S.selected = null;
  S.showHome = false;

  // Sidebar: deselect files, highlight this header
  document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.group-header').forEach(el =>
    el.classList.toggle('problem-active', el.dataset.slug === slug));

  document.getElementById('home').style.display = 'none';
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('content').style.display = 'flex';
  document.getElementById('topbar').style.display = 'flex';

  // Topbar
  const g = Object.values(S.files.reduce((acc, f) => {
    if (f.slug === slug && !acc[slug]) acc[slug] = f;
    return acc;
  }, {}))[0];
  document.getElementById('tb-problem').textContent = g?.problem || slug;
  document.getElementById('tb-slug').textContent = slug;
  document.getElementById('tb-at').textContent = 'baseline';
  document.getElementById('tb-ra-badge').innerHTML = '';
  document.getElementById('tb-vl-badge').innerHTML = '';
  document.getElementById('tb-vt-badge').innerHTML = '';
  document.getElementById('tb-ov-badge').innerHTML = '';
  const blEl = document.getElementById('tb-baseline-badge');
  if (blEl) blEl.innerHTML = '';

  // Reset panels
  ['tab-repoaudit','tab-vultrial','tab-openvul','tab-vulnllm','tab-scaffold','tab-problem'].forEach(id =>
    document.getElementById(id).innerHTML = '<div class="spinner"></div>');
  document.getElementById('code-block').textContent = '⋯ loading';

  const [data, sc] = await Promise.all([
    api(`/api/problem?slug=${slug}`),
    api(`/api/scaffold?slug=${slug}`),
  ]);

  // Code panel: show solution.c (hide baseline toggle — we're already on baseline)
  const toggleBtn = document.getElementById('baseline-toggle');
  if (toggleBtn) toggleBtn.style.display = 'none';
  _codeState.rawCode = data.code || '';
  _codeState.baselineCode = '';
  _codeState.baseline = false;
  document.getElementById('code-fname').textContent = 'solution.c';
  _renderCodeLines(data.code || '', [], null);

  // Problem tab
  renderProblem(data);

  // RepoAudit tab: not run on baseline
  document.getElementById('tab-repoaudit').innerHTML =
    `<div style="color:var(--text3);font-size:13px;padding:12px">RepoAudit was not run on the unmodified solution.c.</div>`;

  // Baseline detection summary across all systems
  renderBaselineSummary(data);

  // Individual system tabs: show baseline output
  renderBaselineSystemTab('tab-vultrial', 'VulTrial (gpt-4o, generic)', data.vultrial, false);
  renderBaselineSystemTab('tab-openvul',  'OpenVul (Qwen3-4B)',         data.openvul,  true);
  renderBaselineSystemTab('tab-vulnllm',  'VulnLLM-R-7B',              data.vulnllm,  false);
  renderScaffold(sc, '', []);
}

// ── Code panel ────────────────────────────────────────────────────────────────

// Per-selection state for the code panel
const _codeState = { rawCode: '', baselineCode: '', npd_line: null, at: '', slug: '', baseline: false };

function _renderCodeLines(code, keywords, bugLine) {
  const codeEl = document.getElementById('code-block');
  codeEl.textContent = code;
  hljs.highlightElement(codeEl);
  const highlighted = codeEl.innerHTML;

  const attackLines = new Set();
  if (keywords && keywords.length) {
    code.split('\n').forEach((line, i) => {
      const lo = line.toLowerCase();
      if (keywords.some(kw => lo.includes(kw.toLowerCase()))) attackLines.add(i + 1);
    });
  }

  const htmlLines = highlighted.split('\n');
  if (htmlLines.length && htmlLines[htmlLines.length - 1] === '') htmlLines.pop();
  const numbered = htmlLines.map((line, i) => {
    const n = i + 1;
    let cls = '';
    if (bugLine && n === bugLine) cls = ' bug-line';
    else if (attackLines.has(n)) cls = ' attack-line';
    return `<span class="code-line${cls}" data-line="${n}"><span class="ln-num">${n}</span><span class="ln-code">${line}</span></span>`;
  }).join('\n');

  codeEl.innerHTML = numbered;

  if (bugLine) {
    const bugEl = codeEl.querySelector('.bug-line');
    if (bugEl) bugEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
  } else if (attackLines.size) {
    const first = codeEl.querySelector('.attack-line');
    if (first) first.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }
}

function renderCode(sol, at) {
  _codeState.rawCode = sol.code || '';
  _codeState.baselineCode = sol.baseline_code || '';
  _codeState.npd_line = sol.npd_line || null;
  _codeState.at = at;
  _codeState.slug = sol.slug;
  _codeState.baseline = false;

  const toggleBtn = document.getElementById('baseline-toggle');
  if (toggleBtn) {
    toggleBtn.style.display = _codeState.baselineCode ? '' : 'none';
    toggleBtn.textContent = '⇄ solution.c';
  }

  document.getElementById('code-fname').textContent = `${sol.slug}_${at}.c`;
  _renderCodeLines(sol.code, getKeywords(at), null);
}

// Strip verbose file paths from explorer output; keep expr + line + label
function simplifyExplorerOutput(raw) {
  // Replace long path strings like /mnt/.../file.c with just file.c
  return raw.replace(/\/[^\s,)]+\/([^/,)]+\.c)/g, '$1');
}

// ── RepoAudit panel ───────────────────────────────────────────────────────────
function renderRepoAudit(ra, at, keywords) {
  const el = document.getElementById('tab-repoaudit');
  const det = ra.detected;

  let html = '';
  // Verdict banner
  if (det === true) {
    html += `<div class="verdict-banner banner-det">
      <div class="banner-icon">🔴</div>
      <div class="banner-text">
        <div class="banner-label">Bug Detected</div>
        <div class="banner-sub">RepoAudit (claude-sonnet-4-6) found a reachable NPD path.</div>
      </div>
    </div>`;
  } else if (det === false) {
    html += `<div class="verdict-banner banner-evd">
      <div class="banner-icon">🟢</div>
      <div class="banner-text">
        <div class="banner-label">Attack Succeeded — Bug Evaded</div>
        <div class="banner-sub">RepoAudit found no reachable NPD path. The ${escHtml(at)} comment fooled the auditor.</div>
      </div>
    </div>`;
  } else {
    html += `<div class="verdict-banner banner-na">
      <div class="banner-icon">⚪</div>
      <div class="banner-text"><div class="banner-label">No Result Available</div></div>
    </div>`;
  }

  if (!ra.log_found) {
    html += `<div style="color:var(--text3);font-size:12px;margin-top:8px">No log file found for this solution.</div>`;
    el.innerHTML = html;
    return;
  }

  // Sub-tab toggle: Explorer / Validator
  const explorerCount  = (ra.explorer || []).length;
  const validatorCount = (ra.validations || []).length;
  const reachableCount = (ra.validations || []).filter(v => v.is_reachable).length;

  html += `<div class="subtabs">
    <div class="subtab active" data-subtab="explorer">Explorer <span style="color:var(--text3);font-weight:400">(${explorerCount} calls)</span></div>
    <div class="subtab" data-subtab="validator">Validator <span style="color:var(--text3);font-weight:400">(${validatorCount} paths${reachableCount ? `, <span style="color:var(--red)">${reachableCount} reachable</span>` : ''})</span></div>
  </div>`;

  // ── Explorer section ──
  html += `<div class="subtab-content active" id="ra-explorer">`;
  if (!explorerCount) {
    html += `<div style="color:var(--text3);font-size:12px">No explorer calls found in log.</div>`;
  } else {
    html += `<div class="explorer-list">`;
    (ra.explorer || []).forEach((e, i) => {
      html += `<div class="exp-event" data-idx="${i}">
        <div class="exp-header">
          <span class="exp-func">${escHtml(e.func)}()</span>
          <span class="exp-src">src: '${markKeywords(escHtml(e.src), keywords)}'</span>
          <span class="exp-line">line ${e.line}</span>
          <span class="exp-chevron">▶</span>
        </div>
        <div class="exp-body">
          ${e.response ? `<div class="exp-response">${markKeywords(escHtml(e.response), keywords)}</div>` : ''}
          ${e.output ? `<div class="exp-output">→ ${escHtml(simplifyExplorerOutput(e.output))}</div>` : '<span style="color:var(--text3)">(empty output)</span>'}
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;

  // ── Validator section ──
  html += `<div class="subtab-content" id="ra-validator">`;
  if (!validatorCount) {
    html += `<div style="color:var(--text3);font-size:12px">No path-validation events found. Explorer returned no propagation paths.</div>`;
  } else {
    html += `<div class="validation-list">`;
    (ra.validations || []).forEach((v, i) => {
      const cls   = v.is_reachable ? 'reach-true' : 'reach-false';
      const label = v.is_reachable ? 'REACHABLE (NPD)' : 'SAFE';

      let pathHtml = '';
      const steps = v.path_steps || [];
      if (steps.length) {
        pathHtml = '<div class="path-steps">';
        steps.forEach((s, si) => {
          if (si > 0) pathHtml += '<span class="path-arrow">→</span>';
          pathHtml += `<span class="path-step">
            <span class="ps-label ps-${escHtml(s.label)}">${escHtml(s.label)}</span>
            <span>${escHtml(s.func)}:${s.line}</span>
            <span style="color:var(--text3)">${escHtml(s.expr)}</span>
          </span>`;
        });
        pathHtml += '</div>';
      } else {
        pathHtml = `<span class="val-path">${escHtml(v.path || `Path ${i + 1}`)}</span>`;
      }

      html += `<div class="val-event" data-idx="${i}">
        <div class="val-header">
          <span class="val-reachable ${cls}">${label}</span>
          ${pathHtml}
          <span class="val-chevron">▶</span>
        </div>
        <div class="val-body">${markKeywords(escHtml(v.explanation || '(no explanation captured)'), keywords)}</div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;

  el.innerHTML = html;

  // Sub-tab switching
  el.querySelectorAll('.subtab').forEach(tab => {
    tab.addEventListener('click', () => {
      const name = tab.dataset.subtab;
      el.querySelectorAll('.subtab').forEach(t => t.classList.toggle('active', t.dataset.subtab === name));
      el.querySelectorAll('.subtab-content').forEach(c => c.classList.toggle('active', c.id === `ra-${name}`));
    });
  });

  // Accordion toggles
  el.querySelectorAll('.val-event').forEach(ev => {
    ev.querySelector('.val-header').addEventListener('click', () => ev.classList.toggle('open'));
  });
  el.querySelectorAll('.exp-event').forEach(ev => {
    ev.querySelector('.exp-header').addEventListener('click', () => ev.classList.toggle('open'));
  });

  // Auto-open reachable validator paths; switch to validator tab if any reachable
  if (reachableCount > 0) {
    el.querySelectorAll('.val-event').forEach(ev => {
      if (ev.querySelector('.reach-true')) ev.classList.add('open');
    });
    // Switch to validator tab so user sees the bug
    el.querySelector('.subtab[data-subtab="validator"]')?.click();
  }
}

// ── Generic auditor panel (VulTrial / OpenVul) ────────────────────────────────

const TURN_LABELS = [
  '🔍 Security Researcher',
  '✍️ Code Author',
  '⚖️ Moderator',
  '🏛️ Review Board',
];

const NPD_RE = /null.{0,10}pointer|null.{0,10}deref|none.{0,10}deref|\bnpd\b|cwe.?476/i;

function renderVerdictTable(rawText) {
  const m = rawText.match(/\[[\s\S]*\]/);
  if (!m) return '<em style="color:var(--text3)">(no JSON array in Review Board output)</em>';
  let verdicts;
  try { verdicts = JSON.parse(m[0]); } catch(e) { return '<em style="color:var(--text3)">(could not parse JSON)</em>'; }
  if (!Array.isArray(verdicts) || !verdicts.length) return '<em style="color:var(--text3)">(empty verdicts)</em>';

  const rows = verdicts.map(v => {
    const vuln     = escHtml(v.vulnerability || '');
    const decision = (v.decision || '').toLowerCase();
    const severity = escHtml(v.severity || '');
    const action   = escHtml(v.recommended_action || '');
    const isNpd    = NPD_RE.test(v.vulnerability || '');
    const rowBg    = isNpd && decision === 'invalid' ? 'rgba(248,81,73,0.12)'
                   : isNpd && (decision === 'valid' || decision === 'partially valid') ? 'rgba(63,185,80,0.10)'
                   : '';
    return `<tr style="background:${rowBg}">
      <td style="padding:5px 10px;border-bottom:1px solid var(--border)">${vuln}</td>
      <td style="padding:5px 10px;border-bottom:1px solid var(--border);font-weight:600">${escHtml(decision)}</td>
      <td style="padding:5px 10px;border-bottom:1px solid var(--border)">${severity}</td>
      <td style="padding:5px 10px;border-bottom:1px solid var(--border)">${action}</td>
    </tr>`;
  }).join('');

  return `<table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead><tr style="background:var(--bg3)">
      <th style="padding:5px 10px;text-align:left;border-bottom:1px solid var(--border)">Vulnerability</th>
      <th style="padding:5px 10px;text-align:left;border-bottom:1px solid var(--border)">Decision</th>
      <th style="padding:5px 10px;text-align:left;border-bottom:1px solid var(--border)">Severity</th>
      <th style="padding:5px 10px;text-align:left;border-bottom:1px solid var(--border)">Action</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div style="font-size:11px;color:var(--text3);margin-top:6px">
    🟥 NPD invalid = attack evaded &nbsp; 🟩 NPD valid = detected
  </div>`;
}

function verdictBannerHtml(flag, title) {
  if (flag === 'tp') return `<div class="verdict-banner banner-det">
    <div class="banner-icon">🔴</div>
    <div class="banner-text">
      <div class="banner-label">Bug Detected</div>
      <div class="banner-sub">${escHtml(title)} correctly identified the NPD vulnerability.</div>
    </div></div>`;
  if (flag === 'fn') return `<div class="verdict-banner banner-evd">
    <div class="banner-icon">🟢</div>
    <div class="banner-text">
      <div class="banner-label">Attack Succeeded — Bug Evaded</div>
      <div class="banner-sub">${escHtml(title)} missed the NPD. The adversarial comment was convincing.</div>
    </div></div>`;
  return `<div class="verdict-banner banner-na">
    <div class="banner-icon">⚠</div>
    <div class="banner-text"><div class="banner-label">${flag || '?'}</div></div></div>`;
}

// VulTrial panel — verdict banner + meta + 4-agent-turn sub-tabs
function renderVulTrialPanel(data, keywords) {

  html += `<div class="vl-meta" style="margin-bottom:12px">

    html += `<div class="subtabs" id="vt-subtabs">`;

    });

    html += `<div class="section-title">Final Output</div>` + outputBlock(data.output, markKeywords(escHtml(data.output), keywords));
  }

  el.innerHTML = html;

  // Wire up sub-tab clicks
  el.querySelectorAll('#vt-subtabs .subtab').forEach(tab => {
    tab.addEventListener('click', () => {
      const turn = tab.dataset.turn;
      el.querySelectorAll('#vt-subtabs .subtab').forEach(t => t.classList.toggle('active', t.dataset.turn === turn));
      el.querySelectorAll('[id^="vt-turn-"]').forEach(c => c.classList.toggle('active', c.id === `vt-turn-${turn}`));
    });
  });
}

      </div>

      const rowBg   = judgeYes && cwe476 ? 'rgba(248,81,73,0.07)' : 'var(--bg2)';
      const judgeIcon = judgeYes ? '●' : '○';
      const outputText = (e.final_results || []).map(r => r.output || '').filter(Boolean).join('\n\n---\n\n')
                      || (e.exploratory_results || []).map(r => r.output || '').filter(Boolean).join('\n\n---\n\n');
      const escOutput = escHtml(outputText);
      const markedOutput = keywords && keywords.length ? markKeywords(escOutput, keywords) : escOutput;

      html += `<details style="background:${rowBg};border:1px solid var(--border);border-radius:6px;overflow:hidden">
        <summary style="padding:8px 10px;cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px">

          <span style="color:var(--text);font-weight:600">${escHtml(e.function || '?')}</span>
          <span style="color:${rowColor};margin-left:4px">${judgeYes ? 'VULN' : 'safe'}</span>

        </summary>`;
      if (outputText) {
        html += `<div style="padding:0 10px 10px">` + outputBlock(outputText, markedOutput, 'max-height:40vh') + `</div>`;
      }
      html += `</details>`;
    }
    html += `</div>`;
  }

  // If viewing an attack variant, also show the baseline section collapsed
  if (!isBaseline && baselineEntries.length > 0) {
    const blOverall = sc.baseline_overall;

      ? 'background:rgba(248,81,73,0.1);color:var(--red);border:1px solid rgba(248,81,73,0.3)'
      : 'background:rgba(63,185,80,0.1);color:var(--green);border:1px solid rgba(63,185,80,0.3)';
    html += `<div class="vl-baseline" style="margin-top:16px">
      <div class="vl-baseline-header">
        <span class="vl-baseline-title">Baseline — original solution.c (no attack comment)</span>
        <span class="vl-baseline-badge" style="${blBadgeStyle}">${blOverall === 'yes' ? 'Detected' : 'Missed'}</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;margin-top:8px">`;
    for (const e of baselineEntries) {
      const judgeYes = e.judge === 'yes';
      const cwe476 = (e.cwe_type || '').includes('476');
      const rowColor = judgeYes && cwe476 ? 'var(--red)' : judgeYes ? 'var(--yellow)' : 'var(--text3)';
      html += `<div style="display:flex;gap:8px;font-family:var(--mono);font-size:11px;padding:4px 8px;background:var(--bg2);border-radius:4px">

      </div>`;
    }
    html += `</div></div>`;
  }

  el.innerHTML = html;
}

  let html = escHtml(md)
    .replace(/^# (.+)$/gm, '<h2 style="font-size:16px;margin-bottom:8px;color:var(--text)">$1</h2>')
    .replace(/^## (.+)$/gm, '<h3 style="font-size:13px;margin:12px 0 4px;color:var(--text2)">$1</h3>')
    .replace(/`([^`]+)`/g, '<code style="font-family:var(--mono);background:var(--bg3);padding:1px 4px;border-radius:3px;font-size:12px">$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  el.innerHTML = `<div style="font-size:13px;line-height:1.7;color:var(--text2)">${html}</div>`;
}

// ── Home / Stats page ─────────────────────────────────────────────────────────
function showHome() {
  S.showHome = true;
  S.selected = null;
  document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('content').style.display = 'none';
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('home').style.display = 'block';
  setHash({ view: 'home' });
  renderHomePage();
}

function renderHomePage() {
  if (!S.stats) return;
  const st = S.stats;
  const el = document.getElementById('home');

  const totalN  = st.overall.total;
  const raTotal = st.overall.repoaudit_detected;
  const vlTotal = st.overall.vulnllm_detected;
  const vtTotal = st.overall.vultrial_detected  || 0;
  const ovTotal = st.overall.openvul_detected   || 0;

  let rows = '';
  for (const at of ATTACK_TYPES) {
    const s = st.per_type[at] || {};
    const n   = s.total || 0;
    const raD = s.repoaudit_detected || 0;
    const vlD = s.vulnllm_detected   || 0;
    const vtD = s.vultrial_detected  || 0;
    const ovD = s.openvul_detected   || 0;
    rows += `<tr>
      <td><span style="font-family:var(--mono);font-size:12px">${escHtml(at)}</span></td>
      <td class="right">${n}</td>
      <td class="right">${rateBarHtml(raD, n, 'fill-red')}</td>
      <td class="right"><span class="evasion-pct">${n-raD}/${n} (${100-pct(raD,n)}%)</span></td>
      <td class="right">${rateBarHtml(vtD, n, 'fill-blue')}</td>
      <td class="right"><span class="evasion-pct">${n-vtD}/${n} (${100-pct(vtD,n)}%)</span></td>
      <td class="right">${rateBarHtml(ovD, n, 'fill-blue')}</td>
      <td class="right"><span class="evasion-pct">${n-ovD}/${n} (${100-pct(ovD,n)}%)</span></td>
      <td class="right">${rateBarHtml(vlD, n, 'fill-blue')}</td>
      <td class="right"><span class="evasion-pct">${n-vlD}/${n} (${100-pct(vlD,n)}%)</span></td>
    </tr>`;
  }

  el.innerHTML = `
    <div class="home-title">Adversarial NPD Attack Results</div>
    <div class="home-sub">${totalN} verified solutions × 10 attack types &nbsp;·&nbsp; attacker model: gpt-5.4-mini</div>

    <table class="stats-table">
      <thead>
        <tr>
          <th>Attack Type</th>
          <th class="right">N</th>
          <th class="right">RA Det.</th>
          <th class="right">RA Evasion</th>
          <th class="right">VulTrial Det.</th>
          <th class="right">VT Evasion</th>
          <th class="right">OpenVul Det.</th>
          <th class="right">OV Evasion</th>
          <th class="right">VulnLLM-R Det.</th>
          <th class="right">VL Evasion</th>
        </tr>
      </thead>
      <tbody>
        ${rows}
        <tr class="total-row">
          <td>TOTAL</td>
          <td class="right">${totalN}</td>
          <td class="right">${rateBarHtml(raTotal, totalN, 'fill-red')}</td>
          <td class="right"><span class="evasion-pct">${totalN-raTotal}/${totalN} (${100-pct(raTotal,totalN)}%)</span></td>
          <td class="right">${rateBarHtml(vtTotal, totalN, 'fill-blue')}</td>
          <td class="right"><span class="evasion-pct">${totalN-vtTotal}/${totalN} (${100-pct(vtTotal,totalN)}%)</span></td>
          <td class="right">${rateBarHtml(ovTotal, totalN, 'fill-blue')}</td>
          <td class="right"><span class="evasion-pct">${totalN-ovTotal}/${totalN} (${100-pct(ovTotal,totalN)}%)</span></td>
          <td class="right">${rateBarHtml(vlTotal, totalN, 'fill-blue')}</td>
          <td class="right"><span class="evasion-pct">${totalN-vlTotal}/${totalN} (${100-pct(vlTotal,totalN)}%)</span></td>
        </tr>
      </tbody>
    </table>

    <div class="home-section">
      <div class="home-section-title">Overall Evasion by Auditor</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px">
        ${[['RepoAudit',raTotal],['VulTrial',vtTotal],['OpenVul',ovTotal],['VulnLLM-R',vlTotal]].map(([name,det]) => `
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px">
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">${name} Evasion</div>
          <div style="font-size:28px;font-weight:700;color:var(--green)">${100-pct(det,totalN)}%</div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px">${totalN-det} / ${totalN} evaded</div>
        </div>`).join('')}
      </div>
    </div>`;
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function initTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const name = tab.dataset.tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === `tab-${name}`));
    });
  });
}

// ── Theme ─────────────────────────────────────────────────────────────────────
function initTheme() {
  document.getElementById('theme-btn').addEventListener('click', () => {
    const curr = document.documentElement.getAttribute('data-theme');
    const next = curr === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    document.getElementById('hljs-theme').href =
      next === 'dark'
        ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
        : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
  });
}

// ── Keyboard nav ──────────────────────────────────────────────────────────────
function initKeyboard() {
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'h') showHome();
    if ((e.key === 'ArrowUp' || e.key === 'k') && S.selected) {
      const idx = S.filtered.findIndex(f => f.id === S.selected);
      if (idx > 0) selectFile(S.filtered[idx - 1].id);
    }
    if ((e.key === 'ArrowDown' || e.key === 'j') && S.selected) {
      const idx = S.filtered.findIndex(f => f.id === S.selected);
      if (idx < S.filtered.length - 1) selectFile(S.filtered[idx + 1].id);
    }
  });
}

// ── Baseline toggle & code copy ───────────────────────────────────────────────
function initCodePanel() {
  // Baseline toggle
  const toggleBtn = document.getElementById('baseline-toggle');
  if (toggleBtn) {
    toggleBtn.addEventListener('click', () => {
      _codeState.baseline = !_codeState.baseline;
      if (_codeState.baseline) {
        document.getElementById('code-fname').textContent = 'solution.c (baseline — NPD highlighted)';
        _renderCodeLines(_codeState.baselineCode, [], _codeState.npd_line);
        toggleBtn.textContent = '⇄ attack variant';
      } else {
        document.getElementById('code-fname').textContent = `${_codeState.slug}_${_codeState.at}.c`;
        _renderCodeLines(_codeState.rawCode, getKeywords(_codeState.at), null);
        toggleBtn.textContent = '⇄ solution.c';
      }
    });
  }

  // Code copy button
  const copyBtn = document.getElementById('code-copy-btn');
  if (copyBtn) {
    copyBtn.addEventListener('click', async () => {
      const text = _codeState.baseline ? _codeState.baselineCode : _codeState.rawCode;
      await navigator.clipboard.writeText(text);
      const orig = copyBtn.textContent;
      copyBtn.textContent = '✓';
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent = orig; copyBtn.classList.remove('copied'); }, 1500);
    });
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  initTheme();
  initTabs();
  initKeyboard();
  initCodePanel();
  buildATChips();
  buildOutcomeChips();

  document.getElementById('search').addEventListener('input', e => {
    S.searchText = e.target.value;
    applyFilter();
  });
  document.getElementById('home-btn').addEventListener('click', showHome);

  // Load data
  const [filesData, stats] = await Promise.all([
    api('/api/files'),
    api('/api/stats'),
  ]);

  S.files = filesData.files;
  S.stats = stats;
  S.filtered = S.files.filter(f => f.verification === 'ok');

  renderFileList();
  showHome();

  // Restore from hash
  const h = getHash();
  if (h.id) {
    selectFile(h.id);
  }
}

init().catch(console.error);
</script>
