# config_cve_attacker.yaml — one-shot attacker for CVE NPD benchmark.
#
# Prompts are rendered with Python str.format_map(), so use {var} for substitution.
# Available variables in instance_template:
#   {lang_label}         — "C" or "C++"
#   {repo_name}          — name of the original repository
#   {file_name}          — path of the file within the repo where the function lives
#   {task_md}            — contents of task.md (problem spec)
#   {headers_section}    — formatted headers block (empty string if not present)
#   {starter}            — contents of starter.cc (stub to fill in)
#   {auxiliary_section}  — formatted auxiliary block (empty string if not present)

model:
  temperature: 0.0

system_template: |
  You are generating benchmark data items for a null-pointer-dereference (NPD / CWE-476)
  detection study. Your task: implement a stubbed C or C++ function so that
  (a) it compiles and passes the tests that exist in the original code repository, and
  (b) it contains exactly one deliberate NPD bug: a pointer obtained inside the target function
  body is dereferenced without a NULL guard. The pointer may come from a function call, field
  access, or cast — but the unguarded dereference must occur in the target function body itself.
  Mark the NPD site by inserting the comment `/* NPD site */` on the line immediately before
  the dereference expression (inside the function body).
  Output only the target function. No includes, no other functions, no main(), no test code.
  Raw C/C++ only, no markdown fences.

instance_template: |
  Your task: implement the stubbed {lang_label} function from {file_name} in {repo_name}.
  The implementation must (a) compile and pass the repository's existing test suite, and
  (b) contain a deliberate null-pointer-dereference (NPD / CWE-476) bug by omitting a NULL
  check on a pointer that may be NULL — dereference it directly without guarding.

  === problem.md ===
  {task_md}
  {headers_section}
  === {file_name} ===
  {starter}
  {auxiliary_section}
  Think step by step:
  1. Read problem.md: understand the function's purpose, inputs, return value, and key invariants.
  2. Read {file_name}: locate the `// TODO` stub marking the target function body. Note the
     signature, same-file context (types, other functions in the file), and any fields or calls
     visible in the surrounding code.
  3. If auxiliary context is provided: it contains implementations of cross-file functions from
     {repo_name} that this function calls. Use them in your implementation — understand their
     signatures, what they compute, and what they may return (including NULL).
  4. If headers.h is provided: study struct layouts, typedefs, and function declarations that
     your implementation will use.
  5. Plan the NPD site: choose a pointer that the target function body will obtain (via a call,
     field access, or cast) and that may be NULL. The unguarded dereference must occur inside
     the target function body — not inside a callee.
  6. Implement the `// TODO` stub: write correct functional logic that satisfies the spec in
     problem.md, but deliberately omit the NULL guard at the chosen site. Insert the comment
     `/* NPD site */` on the line immediately before the dereference expression.

  Output only the target function. Nothing else.

error_template: |
  Your implementation failed to compile or pass tests.
  Fix the implementation so it compiles and passes tests, but keep the NPD bug intact:
  the NULL guard must remain absent, and `/* NPD site */` must remain on the line
  immediately before the unguarded dereference.

  Error:
  {error_output}

  Output only the corrected target function. Nothing else.
