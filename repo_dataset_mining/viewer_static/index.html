<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPD Benchmark Viewer</title>
<link rel="stylesheet" id="hljs-theme"
  href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0d1117; --bg2:    #161b22; --bg3:    #21262d; --bg4:    #30363d;
  --border: #30363d; --text:   #e6edf3; --text2:  #8b949e; --text3:  #6e7681;
  --accent: #58a6ff; --green:  #3fb950; --red:    #f85149;
  --yellow: #d29922; --purple: #bc8cff; --orange: #f0883e;
  --sidebar: 280px;
  --mono: 'SF Mono','Fira Code','Cascadia Code',Consolas,monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --radius: 6px;
}
[data-theme="light"] {
  --bg: #fff; --bg2: #f6f8fa; --bg3: #eaeef2; --bg4: #d0d7de;
  --border: #d0d7de; --text: #1f2328; --text2: #656d76; --text3: #8c959f;
  --accent: #0969da; --green: #1a7f37; --red: #d1242f;
  --yellow: #9a6700; --purple: #8250df; --orange: #bc4c00;
}
[data-theme="light"] #hljs-theme { }

html, body { height: 100%; font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 14px; }

/* ── Layout ── */
#app { display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar); min-width: var(--sidebar);
  background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sb-header {
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.sb-title { font-weight: 700; font-size: 13px; flex: 1; }
.sb-title span { color: var(--accent); }
.icon-btn {
  background: none; border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text2); padding: 4px 8px; cursor: pointer; font-size: 12px;
}
.icon-btn:hover { background: var(--bg3); color: var(--text); }

#sample-list { flex: 1; overflow-y: auto; padding: 8px 0; }

.sample-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; cursor: pointer; border-left: 3px solid transparent;
  transition: background 0.12s;
}
.sample-item:hover { background: var(--bg3); }
.sample-item.active { background: var(--bg3); border-left-color: var(--accent); }

.sample-id { font-weight: 700; font-size: 13px; font-family: var(--mono); flex: none; }
.sample-info { flex: 1; min-width: 0; }
.sample-fn { font-size: 12px; color: var(--text2); font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sample-src { font-size: 11px; color: var(--text3); margin-top: 2px; }

.badge {
  font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 10px;
  white-space: nowrap; flex: none;
}
.badge-validated { background: color-mix(in srgb, var(--green) 20%, transparent); color: var(--green); }
.badge-tests_pass { background: color-mix(in srgb, var(--yellow) 20%, transparent); color: var(--yellow); }
.badge-incomplete { background: color-mix(in srgb, var(--red) 20%, transparent); color: var(--red); }
.badge-missing { background: color-mix(in srgb, var(--text3) 20%, transparent); color: var(--text3); }
.badge-no_harness { background: color-mix(in srgb, var(--orange) 20%, transparent); color: var(--orange); }

/* ── Main panel ── */
#main {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  background: var(--bg);
}

/* ── Header ── */
#header {
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  background: var(--bg2); display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
#header-title { font-weight: 700; font-size: 15px; }
#header-meta { font-size: 12px; color: var(--text2); font-family: var(--mono); flex: 1; }
#header-status { }

/* ── Tabs ── */
#tabs {
  display: flex; border-bottom: 1px solid var(--border);
  background: var(--bg2); padding: 0 16px; flex-shrink: 0;
}
.tab {
  padding: 10px 14px; font-size: 13px; cursor: pointer; color: var(--text2);
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color 0.12s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Content area ── */
#content { flex: 1; overflow-y: auto; padding: 20px; }

/* ── Empty state ── */
#empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--text3); gap: 8px;
}
#empty .empty-icon { font-size: 48px; }
#empty .empty-msg { font-size: 14px; }

/* ── Code blocks ── */
.code-wrap {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; font-family: var(--mono); font-size: 12.5px; line-height: 1.6;
}
.code-wrap pre { margin: 0; overflow-x: auto; }
.code-wrap code { background: none !important; padding: 0 !important; font-size: inherit; }

.code-line { display: flex; }
.line-num {
  user-select: none; color: var(--text3); text-align: right; padding: 0 12px;
  min-width: 48px; background: var(--bg3); border-right: 1px solid var(--border);
  flex: none;
}
.line-src { padding: 0 12px; white-space: pre; flex: 1; }
.line-npd { background: color-mix(in srgb, var(--red) 18%, transparent) !important; }
.line-npd .line-num { background: color-mix(in srgb, var(--red) 30%, var(--bg3)); color: var(--red); }
.line-npd .line-src { color: var(--text); }
.npd-marker {
  display: inline-block; margin-left: 8px;
  background: var(--red); color: #fff; font-size: 10px; font-weight: 700;
  padding: 0 5px; border-radius: 3px; vertical-align: middle;
}
.line-filled { background: color-mix(in srgb, var(--green) 10%, transparent) !important; }
.line-filled .line-num { background: color-mix(in srgb, var(--green) 22%, var(--bg3)); color: var(--green); }

/* ── Copy button ── */
.copy-wrap { position: relative; }
.copy-btn {
  position: absolute; top: 8px; right: 8px; z-index: 10;
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text2); font-size: 11px; font-family: var(--sans);
  padding: 3px 9px; cursor: pointer; opacity: 0; transition: opacity 0.15s;
}
.copy-wrap:hover .copy-btn { opacity: 1; }
.copy-btn:hover { background: var(--bg4); color: var(--text); }
.copy-btn.copied { color: var(--green); border-color: var(--green); }

/* ── Prompt blocks ── */
.prompt-block {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 16px; font-family: var(--mono); font-size: 12px; line-height: 1.6;
  white-space: pre-wrap; word-break: break-word; overflow-x: auto; max-height: 480px; overflow-y: auto;
  color: var(--text);
}

/* ── Markdown ── */
.md-body { max-width: 780px; line-height: 1.7; color: var(--text); }
.md-body h1 { font-size: 22px; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.md-body h2 { font-size: 16px; margin: 20px 0 8px; color: var(--text); }
.md-body h3 { font-size: 14px; margin: 14px 0 6px; color: var(--text2); }
.md-body p { margin-bottom: 10px; }
.md-body ul, .md-body ol { margin: 8px 0 10px 20px; }
.md-body li { margin-bottom: 4px; }
.md-body code { font-family: var(--mono); font-size: 12px; background: var(--bg3); padding: 1px 5px; border-radius: 3px; }
.md-body pre { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; overflow-x: auto; margin: 10px 0; }
.md-body pre code { background: none; padding: 0; font-size: 12.5px; }
.md-body strong { color: var(--text); }
.md-body blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text2); }

/* ── CodeQL findings table ── */
.findings-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.findings-table th {
  text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border);
  color: var(--text2); font-weight: 600; background: var(--bg2);
}
.findings-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
.findings-table tr:hover td { background: var(--bg2); }
.findings-table .loc { font-family: var(--mono); font-size: 12px; color: var(--accent); white-space: nowrap; }
.findings-table .msg { color: var(--text2); font-size: 12px; }
.findings-table .npd-row td { background: color-mix(in srgb, var(--red) 8%, transparent); }

/* ── Metadata ── */
.meta-grid { display: grid; grid-template-columns: 160px 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
.meta-key { background: var(--bg2); padding: 8px 12px; font-size: 12px; color: var(--text2); font-weight: 600; }
.meta-val { background: var(--bg); padding: 8px 12px; font-size: 12px; font-family: var(--mono); word-break: break-all; }
.meta-val a { color: var(--accent); }

/* ── Test output ── */
.test-output {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px; font-family: var(--mono); font-size: 12px; white-space: pre-wrap;
  max-height: 300px; overflow-y: auto;
}
.test-pass { color: var(--green); }
.test-fail { color: var(--red); }

.section-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text3); margin-bottom: 8px; margin-top: 20px;
}
.section-label:first-child { margin-top: 0; }

.no-findings { color: var(--text3); font-size: 13px; padding: 20px 0; }

.pill {
  display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 10px; margin-left: 6px;
}
.pill-red { background: color-mix(in srgb, var(--red) 20%, transparent); color: var(--red); }
.pill-green { background: color-mix(in srgb, var(--green) 20%, transparent); color: var(--green); }
.pill-yellow { background: color-mix(in srgb, var(--yellow) 20%, transparent); color: var(--yellow); }
</style>
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sb-header">
      <div class="sb-title">NPD <span>Benchmark</span></div>
      <button class="icon-btn" onclick="toggleTheme()">☀/☾</button>
    </div>
    <div id="sample-list"></div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="empty">
      <div class="empty-icon">🔍</div>
      <div class="empty-msg">Select a benchmark sample</div>
    </div>

    <div id="detail" style="display:none; flex-direction:column; height:100%; overflow:hidden;">
      <div id="header">
        <div id="header-title"></div>
        <div id="header-meta"></div>
        <div id="header-status"></div>
      </div>
      <div id="tabs">
        <div class="tab active" data-tab="task">Task</div>
        <div class="tab" data-tab="tests">Tests</div>
        <div class="tab" data-tab="target">Target</div>
        <div class="tab" data-tab="model">Model</div>
        <div class="tab" data-tab="prompt">Prompt</div>
        <div class="tab" data-tab="codeql">CodeQL</div>
        <div class="tab" data-tab="meta">Metadata</div>
      </div>
      <div id="content"></div>
    </div>
  </div>
</div>

<script>
let currentSample = null;
let currentTab = 'task';

// ── Theme ──────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('hljs-theme').href = next === 'dark'
    ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
    : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
}

// ── Sidebar ────────────────────────────────────────────────────────────────
async function loadSidebar() {
  const res = await fetch('/api/samples');
  const samples = await res.json();
  const list = document.getElementById('sample-list');
  list.innerHTML = '';
  for (const s of samples) {
    const el = document.createElement('div');
    el.className = 'sample-item';
    el.dataset.id = s.id;
    const srcLabel = s.source === 'prior_work' ? 'prior work' : s.source;
    el.innerHTML = `
      <div class="sample-id">${s.id}</div>
      <div class="sample-info">
        <div class="sample-fn">${s.function || '—'}</div>
        <div class="sample-src">${srcLabel}</div>
      </div>
      <div class="badge badge-${s.status}">${s.status === 'validated' ? '✓' : s.status}</div>
    `;
    el.addEventListener('click', () => selectSample(s.id));
    list.appendChild(el);
  }
}

// ── Sample selection ───────────────────────────────────────────────────────
async function selectSample(id) {
  document.querySelectorAll('.sample-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  const res = await fetch(`/api/sample?id=${encodeURIComponent(id)}`);
  if (!res.ok) return;
  currentSample = await res.json();

  document.getElementById('empty').style.display = 'none';
  const detail = document.getElementById('detail');
  detail.style.display = 'flex';

  const m = currentSample.metadata;
  document.getElementById('header-title').textContent = `${id} — ${m.function || ''}`;
  document.getElementById('header-meta').textContent =
    `${m.repo || ''}  ·  ${m.file || ''}  ·  commit ${m.buggy_commit || ''}`;
  document.getElementById('header-status').innerHTML =
    `<span class="badge badge-${currentSample.status}">${currentSample.status}</span>`;

  showTab(currentTab);
}

// ── Tabs ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => showTab(t.dataset.tab));
});

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  if (!currentSample) return;
  const content = document.getElementById('content');
  content.innerHTML = '';

  if (tab === 'task') renderTask(content);
  else if (tab === 'tests') renderCode(content, currentSample.tests_cc, 'cpp', null, 'tests.cc');
  else if (tab === 'target') renderCode(content, currentSample.target_cc, 'cpp', currentSample.npd_line, 'target.cc');
  else if (tab === 'model') renderModel(content);
  else if (tab === 'prompt') renderPrompt(content);
  else if (tab === 'codeql') renderCodeQL(content);
  else if (tab === 'meta') renderMeta(content);
}

// ── Copy button helper ─────────────────────────────────────────────────────
function makeCopyBtn(getText) {
  const btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.textContent = 'Copy';
  btn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(getText());
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
    } catch {
      btn.textContent = 'Failed';
      setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
    }
  });
  return btn;
}

// ── Task tab (Markdown) ────────────────────────────────────────────────────
function renderTask(container) {
  if (!currentSample.task_md) {
    container.innerHTML = '<div class="no-findings">No task.md found.</div>';
    return;
  }
  const wrap = document.createElement('div');
  wrap.className = 'copy-wrap';
  wrap.style.cssText = 'position:relative;';
  wrap.appendChild(makeCopyBtn(() => currentSample.task_md));

  const div = document.createElement('div');
  div.className = 'md-body';
  div.innerHTML = marked.parse(currentSample.task_md);
  div.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
  wrap.appendChild(div);
  container.appendChild(wrap);
}

// ── Code tab ───────────────────────────────────────────────────────────────
function renderCode(container, src, lang, npdLine, filename, filledLines) {
  if (!src) {
    container.innerHTML = `<div class="no-findings">No ${filename} found.</div>`;
    return;
  }

  const filledSet = new Set(filledLines || []);

  // Label row with copy button
  const header = document.createElement('div');
  header.style.cssText = 'display:flex; align-items:center; margin-bottom:8px;';
  if (filename) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.style.margin = '0';
    lbl.textContent = filename;
    header.appendChild(lbl);
  }
  const copyBtn = makeCopyBtn(() => src);
  copyBtn.style.cssText = 'position:static; opacity:1; margin-left:auto;';
  header.appendChild(copyBtn);
  container.appendChild(header);

  // Build a highlighted version of the full source
  const highlighted = hljs.highlight(src, { language: lang }).value;
  const lines = highlighted.split('\n');

  const wrap = document.createElement('div');
  wrap.className = 'code-wrap';

  const table = document.createElement('div');
  let firstFilled = null;
  lines.forEach((lineHtml, i) => {
    const lineNo = i + 1;
    const isNpd    = npdLine && lineNo === npdLine;
    const isFilled = filledSet.has(lineNo);
    if (isFilled && firstFilled === null) firstFilled = lineNo;

    const row = document.createElement('div');
    row.className = 'code-line' + (isNpd ? ' line-npd' : isFilled ? ' line-filled' : '');
    row.id = `L${lineNo}`;

    const numEl = document.createElement('span');
    numEl.className = 'line-num';
    numEl.textContent = lineNo;

    const srcEl = document.createElement('span');
    srcEl.className = 'line-src';
    srcEl.innerHTML = lineHtml || ' ';
    if (isNpd) srcEl.innerHTML += '<span class="npd-marker">NPD</span>';

    row.appendChild(numEl);
    row.appendChild(srcEl);
    table.appendChild(row);
  });

  wrap.appendChild(table);
  container.appendChild(wrap);

  // Scroll to first filled line (or NPD line)
  const scrollTo = npdLine || firstFilled;
  if (scrollTo) {
    setTimeout(() => {
      const el = document.getElementById(`L${scrollTo}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 50);
  }
}

// ── CodeQL tab ─────────────────────────────────────────────────────────────
function renderCodeQL(container) {
  const findings = currentSample.codeql_findings || [];
  const npdLine = currentSample.npd_line;

  // Test output section
  const to = currentSample.test_output;
  if (to) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = 'Test harness output';
    container.appendChild(lbl);

    const pre = document.createElement('div');
    pre.className = 'test-output';
    const cls = to.returncode === 0 ? 'test-pass' : 'test-fail';
    pre.innerHTML = `<span class="${cls}">${escHtml(to.stdout || '(no output)')}</span>` +
      (to.stderr ? `\n<span class="test-fail">${escHtml(to.stderr)}</span>` : '');
    container.appendChild(pre);
  }

  // Findings table
  const lbl2 = document.createElement('div');
  lbl2.className = 'section-label';
  lbl2.textContent = `CodeQL findings (${findings.length} total)`;
  container.appendChild(lbl2);

  if (findings.length === 0) {
    const msg = document.createElement('div');
    msg.className = 'no-findings';
    msg.textContent = 'No SARIF results found (or CodeQL gate not yet run).';
    container.appendChild(msg);
    return;
  }

  const table = document.createElement('table');
  table.className = 'findings-table';
  table.innerHTML = `<thead><tr><th>File</th><th>Line</th><th>Message</th></tr></thead>`;
  const tbody = document.createElement('tbody');
  for (const f of findings) {
    const isNpd = f.file === 'target.cc' && f.line === npdLine;
    const tr = document.createElement('tr');
    if (isNpd) tr.className = 'npd-row';
    tr.innerHTML = `
      <td class="loc">${escHtml(f.file)}${isNpd ? ' <span class="pill pill-red">NPD site</span>' : ''}</td>
      <td class="loc">${f.line ?? '—'}</td>
      <td class="msg">${escHtml(f.message)}</td>
    `;
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  container.appendChild(table);

  // Gate pass/fail note
  const note = document.createElement('div');
  note.style.cssText = 'margin-top:14px; font-size:12px; color:var(--text3);';
  const gatePass = findings.some(f => f.file === 'target.cc' && f.line === npdLine);
  if (npdLine) {
    note.innerHTML = gatePass
      ? `<span style="color:var(--green)">✓ Positive control: NPD at line ${npdLine} detected by CodeQL.</span>`
      : `<span style="color:var(--yellow)">⚠ Positive control: NPD at line ${npdLine} NOT detected (CodeQL blind spot or gate not run).</span>`;
    container.appendChild(note);
  }
}

// ── Metadata tab ───────────────────────────────────────────────────────────
function renderMeta(container) {
  const m = currentSample.metadata;
  if (!m || Object.keys(m).length === 0) {
    container.innerHTML = '<div class="no-findings">No metadata.json found.</div>';
    return;
  }

  const lbl = document.createElement('div');
  lbl.className = 'section-label';
  lbl.textContent = 'Bug provenance';
  container.appendChild(lbl);

  const grid = document.createElement('div');
  grid.className = 'meta-grid';

  const rows = [
    ['Site ID',       m.site_id],
    ['Source',        m.source],
    ['Repo',          m.repo],
    ['Repo URL',      m.repo_url ? `<a href="${escHtml(m.repo_url)}" target="_blank">${escHtml(m.repo_url)}</a>` : '—'],
    ['Buggy commit',  m.buggy_commit],
    ['File',          m.file],
    ['Function',      m.function],
    ['NPD line',      m.npd_line],
    ['NPD pattern',   m.npd_pattern],
    ['Fix',           m.fix],
  ];

  for (const [key, val] of rows) {
    const k = document.createElement('div');
    k.className = 'meta-key';
    k.textContent = key;
    const v = document.createElement('div');
    v.className = 'meta-val';
    v.innerHTML = val != null ? String(val) : '—';
    grid.appendChild(k);
    grid.appendChild(v);
  }
  container.appendChild(grid);
}

// ── Prompt tab ─────────────────────────────────────────────────────────────
function renderPrompt(container) {
  const p = currentSample.model_prompt;
  if (!p) {
    container.innerHTML = '<div class="no-findings">Prompt not available (starter.cc or sites.json missing).</div>';
    return;
  }

  function addSection(label, text) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = label;
    container.appendChild(lbl);

    const wrap = document.createElement('div');
    wrap.className = 'copy-wrap';
    wrap.style.cssText = 'position:relative;';

    const block = document.createElement('div');
    block.className = 'prompt-block';
    block.textContent = text;

    wrap.appendChild(makeCopyBtn(() => text));
    wrap.appendChild(block);
    container.appendChild(wrap);
  }

  addSection('System message', p.system);
  addSection('User message', p.user);

  // Full prompt copy (both combined)
  const combined = `[SYSTEM]\n${p.system}\n\n[USER]\n${p.user}`;
  const fullBtn = document.createElement('button');
  fullBtn.className = 'icon-btn';
  fullBtn.style.cssText = 'margin-top:14px; display:block;';
  fullBtn.textContent = 'Copy full prompt';
  fullBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(combined);
      fullBtn.textContent = 'Copied!';
      setTimeout(() => { fullBtn.textContent = 'Copy full prompt'; }, 1500);
    } catch { fullBtn.textContent = 'Failed'; setTimeout(() => { fullBtn.textContent = 'Copy full prompt'; }, 1500); }
  });
  container.appendChild(fullBtn);
}

// ── Model tab ──────────────────────────────────────────────────────────────
function renderModel(container) {
  const ev = currentSample.eval_result;
  const src = currentSample.model_solution_cc;

  // Eval result banner
  if (ev) {
    const banner = document.createElement('div');
    banner.style.cssText = 'display:flex; gap:10px; align-items:center; margin-bottom:16px; flex-wrap:wrap;';

    const model = ev.model || '—';
    const compile = ev.build?.compile === 'OK';
    const tests   = ev.build?.tests   === 'PASS';
    const hasNpd  = ev.npd_check?.has_npd;

    banner.innerHTML = `
      <span style="font-size:12px; color:var(--text2); font-family:var(--mono);">${escHtml(model)}</span>
      <span class="pill ${compile ? 'pill-green' : 'pill-red'}">${compile ? 'compile ✓' : 'compile ✗'}</span>
      <span class="pill ${tests ? 'pill-green' : 'pill-red'}">${tests ? 'tests ✓' : (compile ? 'tests ✗' : 'tests —')}</span>
      <span class="pill ${hasNpd ? 'pill-red' : 'pill-green'}">${hasNpd ? 'NPD detected' : 'no NPD detected'}</span>
    `;
    container.appendChild(banner);

    // Compile error detail
    if (!compile && ev.build?.stderr) {
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = 'Compile error';
      container.appendChild(lbl);
      const pre = document.createElement('div');
      pre.className = 'test-output test-fail';
      pre.textContent = ev.build.stderr;
      container.appendChild(pre);
    }
  } else {
    const msg = document.createElement('div');
    msg.className = 'no-findings';
    msg.textContent = 'No eval_local.json found — run eval_local_model.py first.';
    container.appendChild(msg);
  }

  // Legend
  if (src) {
    const legend = document.createElement('div');
    legend.style.cssText = 'font-size:11px; color:var(--text3); margin-bottom:10px; display:flex; gap:14px;';
    legend.innerHTML = `
      <span><span style="display:inline-block;width:10px;height:10px;background:color-mix(in srgb,var(--green) 22%,transparent);border-radius:2px;margin-right:4px;vertical-align:middle;"></span>Model-filled lines</span>
    `;
    container.appendChild(legend);
  }

  // Source code
  renderCode(container, src, 'cpp', null, 'model_solution.cc', currentSample.model_filled_lines);
}

// ── Utilities ──────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Init ───────────────────────────────────────────────────────────────────
loadSidebar();
</script>
